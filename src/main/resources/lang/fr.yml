  admin-help: |
    <blue>--- Commandes Administrateur DanaRanks ---</blue>
     - <white>/danaranks admin setrank <joueur> <niveau></white>
     - <white>/danaranks admin setelo <joueur> <valeur></white>
     - <white>/danaranks admin addelo <joueur> <valeur></white>
     - <white>/danaranks admin removeelo <joueur> <valeur></white>
     - <white>/danaranks admin resetquota <joueur></white>
     - <white>/danaranks admin rush start <ressource> <durée> [délai]</white>
     - <white>/danaranks admin rush stop</white>
     - <white>/danaranks admin rush end</white>
     - <white>/danaranks admin rush info</white>
     - <white>/danaranks admin rush add <joueur></white>
     - <white>/danaranks admin rush leave <joueur></white>

