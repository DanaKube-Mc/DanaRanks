messages:
  prefix: <b><gradient:#F82F04:#FFEE2E>DanaKube</gradient> <#c0c0c0>|</b> <#d4d9d8>
  kick-database-error: "%prefix% Impossible de charger vos données. Veuillez vous reconnecter."
  no-permission: "%prefix% Vous n'avez pas la permission d'exécuter cette commande."
  profile-loaded: "%prefix% Vos données ont bien été chargées !"
  plugin-enabled: "[DanaRanks] DanaRanks has been enabled!"
  plugin-disabled: "[DanaRanks] DanaRanks has been disabled!"
  luckperms-registered: "LuckPerms hook successfully registered."
  luckperms-not-found: "LuckPerms not found! Promotions will be disabled."
  rush-player-only: "<red>Seuls les joueurs peuvent utiliser cette commande.</red>"
  rush-no-active: "%prefix% Aucun<#ffeea2>Rush<#d4d9d8> n'est planifié pour le moment."
  rush-joined: "%prefix% Inscription réussie au rush! Il commencera à <#ffeea2>%time%<#d4d9d8>. Bonne chance !"
  rush-join-already-started: "Déjà en cours"
  rush-already-joined: "%prefix% Vous êtes déjà inscrit au Rush du jour !"
  rush-join-failed: "%prefix% Impossible de s'inscrire. Le Rush est peut-être terminé ou non initialisé."
  rush-help: "%prefix% Commandes disponibles :\n - <#ffeea2>/rush join<#d4d9d8> : S'inscrire au Rush quotidien.\n - <#ffeea2>/rush status<#d4d9d8> : Voir les information du Rush du jour."
  rush-status-no-active: "%prefix% Statut : Aucun Rush planifié pour aujourd'hui."
  rush-status-announced:
    - " "
    - "<#fdba5e><b>⚡ Rush prévu à %time% (Durée: %duration% minutes)!"
    - " "
    - "<#ffeea2>/rush join<#d4d9d8> pour vous inscrire !"
  rush-status-finished: " "
  rush-status-active-registered:
    - " "
    - "<#fdba5e><b>⚡ Rush est en cours !"
    - " "
    - "<#d4d9d8>Temps restant : <#fdba5e>%time%</#fdba5e> minutes."
    - "<#d4d9d8>Ressource : <#fdba5e>%resource%</#fdba5e>"
    - "<#d4d9d8>Votre Score actuel : <#fdba5e>%score%</#fdba5e>"
  rush-status-active-unregistered:
    - " "
    - "<#fdba5e><b>⚡ Rush est en cours !"
    - " "
    - "<#d4d9d8>Temps restant : <#fdba5e>%time%</#fdba5e> minutes."
    - "<#d4d9d8>Ressource : <#fdba5e>%resource%</#fdba5e>"
    - "<#d4d9d8>Vous n'êtes pas inscrit ! <#fdba5e>/rush join</#fdba5e> pour participer !"
  rush-planned-announcement:
    - " "
    - "<#fdba5e><b>⚡ Rush prévu à %time% (Durée: %duration% minutes)!"
    - " "
    - "<#ffeea2>/rush join<#d4d9d8> pour vous inscrire !"
  rush-ended-win: "%prefix%Le Rush s'est terminé ! Vous avez gagné <#91f251>%change%</#91f251> !"
  rush-ended-loss: "%prefix%Le Rush s'est terminé ! Vous avez perdu <#fd5e5e>%change%</#fd5e5e> !"
  rush-discord-planned: "Le Rush quotidien débutera à <#ffeea2>%time%<#d4d9d8> pour <#ffeea2>%duration%<#d4d9d8> minutes ! Les inscriptions sont ouvertes via /rush join !"
  rush-discord-started: "Le Rush sur la ressource %resource% vient de démarrer pour %duration% minutes !"
  rush-discord-pre-announce: "Le Rush démarrera dans %time% minutes ! Tapez /rush join en jeu !"
  player-only: "<red>Seuls les joueurs peuvent exécuter cette commande.</red>"

  # Admin messages
  admin-db-save-error: "<red>Erreur lors de la sauvegarde du profil hors ligne : %error%</red>"
  admin-db-load-error: "<red>Impossible de charger les données du joueur hors ligne : %error%</red>"
  admin-usage-setrank: "<red>Usage: /danaranks admin setrank <joueur> <niveau></red>"
  admin-rank-out-of-bounds: "<red>Le niveau doit être compris entre 1 et 50.</red>"
  admin-rank-invalid-int: "<red>Le niveau doit être un nombre entier.</red>"
  admin-rank-set-success: "<green>Grade de %player% défini à %newrank% (anciennement %oldrank%).</green>"
  admin-usage-setelo: "<red>Usage: /danaranks admin setelo <joueur> <valeur></red>"
  admin-elo-invalid-int: "<red>La valeur ELO doit être un nombre entier.</red>"
  admin-elo-set-success: "<green>ELO de %player% défini à %elo%.</green>"
  admin-usage-addelo: "<red>Usage: /danaranks admin addelo <joueur> <valeur></red>"
  admin-elo-value-positive: "<red>La valeur doit être positive.</red>"
  admin-value-invalid-int: "<red>La valeur doit être un nombre entier.</red>"
  admin-elo-add-success: "<green>Ajouté %amount% ELO à %player%.</green>"
  admin-usage-removeelo: "<red>Usage: /danaranks admin removeelo <joueur> <valeur></red>"
  admin-elo-remove-success: "<red>Retiré %amount% ELO à %player%.</red>"
  admin-usage-resetquota: "<red>Usage: /danaranks admin resetquota <joueur></red>"
  admin-quota-reset-success: "<green>Quotas de %player% réinitialisés pour le rang actif %rank%.</green>"
  admin-usage-rush: "<red>Usage: /danaranks admin rush <start|stop|end|info|add|leave|reload></red>"
  admin-usage-rush-start: "<red>Usage: /danaranks admin rush start <ressource> <durée> [délai_lancement]</red>"
  admin-rush-duration-invalid: "<red>La durée doit être un entier (en minutes).</red>"
  admin-rush-delay-invalid: "<red>Délai invalide. Formats acceptés: minutes (ex: 5), heures (ex: 1h), secondes (ex: 30s).</red>"
  admin-rush-planned:
    - " "
    - "<#fdba5e><b>⚡ Rush prévu dans %delay% minutes (Durée: %duration% minutes)!"
    - " "
    - "<#ffeea2>/rush join<#d4d9d8> pour vous inscrire !"
  admin-rush-started:
    - " "
    - "<#fdba5e><b>⚡ Rush est en cours !"
    - " "
    - "<#d4d9d8>Temps restant : <#fdba5e>%time%</#fdba5e> minutes."
    - "<#d4d9d8>Ressource : <#fdba5e>%resource%</#fdba5e>"
  admin-rush-stopped:
    - " "
    - "<#fdba5e><b>⚡ Rush a été arrêté par l'admin !"
    - " "
    - "<#d4d9d8>Pas de distribution ELO"
  admin-rush-ended:
    - " "
    - "<#fdba5e><b>⚡ Rush est terminé !"
    - " "
    - "<#d4d9d8>Distribution des ELO en cours"
  admin-rush-planned-confirm: "%prefix% <green>Rush planifié sur la ressource %resource% (durée: %duration%m) dans %delay% minutes.</green>"
  admin-rush-started-confirm: "%prefix% <green>Rush forcé démarré sur la ressource %resource% pendant %duration% minutes.</green>"
  admin-rush-stopped-confirm: "%prefix% <green>Rush arrêté de force (sans distribution).</green>"
  admin-rush-ended-confirm: "%prefix% <green>Rush terminé normalement (distribution ELO et résumé lancés).</green>"
  rush-summary-header:
  - " "
  - "<#fdba5e><b>⚡ Rush est terminé !</b></#fdba5e>"
  - " "
  rush-summary-format: "  <yellow>#%pos%</yellow> <white><hover:show_text:'<gray>Cliquez pour voir le profil de %player%</gray>'><click:run_command:'/profile %player%'>%player%</click></hover></white> - <aqua>%score% pts</aqua> (<%color%>%sign%%change% ELO</%color>)"
  admin-usage-rush-add: "<red>Usage: /danaranks admin rush add <joueur></red>"
  admin-player-not-found: "<red>Joueur introuvable ou hors-ligne.</red>"
  admin-rush-player-added: "<green>Joueur %player% ajouté de force au Rush.</green>"
  admin-rush-player-add-failed: "<red>Impossible d'ajouter le joueur (déjà inscrit ou Rush non planifié).</red>"
  admin-usage-rush-leave: "<red>Usage: /danaranks admin rush leave <joueur></red>"
  admin-rush-player-removed: "<green>Joueur %player% retiré de force du Rush.</green>"
  admin-rush-player-remove-failed: "<red>Impossible de retirer le joueur (non inscrit).</red>"
  admin-rush-reload-success: "<green>Planification du Rush rechargée.</green>"
  admin-reload-success: "<green>Configuration, GUIs et Langues de DanaRanks correctement rechargées !</green>"
  admin-help: |
    <blue>--- Commandes Administrateur DanaRanks ---</blue>
     - <white>/danaranks admin setrank <joueur> <niveau></white>
     - <white>/danaranks admin setelo <joueur> <valeur></white>
     - <white>/danaranks admin addelo <joueur> <valeur></white>
     - <white>/danaranks admin removeelo <joueur> <valeur></white>
     - <white>/danaranks admin resetquota <joueur></white>
     - <white>/danaranks admin rush start <ressource> <durée> [délai]</white>
     - <white>/danaranks admin rush stop</white>
     - <white>/danaranks admin rush end</white>
     - <white>/danaranks admin rush info</white>
     - <white>/danaranks admin rush add <joueur></white>
     - <white>/danaranks admin rush leave <joueur></white>

  # Leaderboard messages
  leaderboard-chat-header: "<gold><b>Classement Global (Top 10) :</b></gold>"
  leaderboard-chat-empty: "<gray>Aucun joueur dans le classement pour le moment.</gray>"
  leaderboard-chat-format: "<yellow>#%pos%</yellow> <white>%player%</white> - <gold>Rang %rank% (%elo% ELO)</gold>"

  # Quota messages
  quota-pending-summary:
    - " "
    - "<#fdba5e><b>¤ Quotas - %rank%"
    - " "
    - "<blue>[Quotas] Vos quotas ont expiré pendant votre absence. Variation d'ELO : <%color%>%sign%%change%</%color%></blue>"
  quota-join-header:
    - ""
    - "<#fdba5e><b>¤ Quotas - %rank%</b>"
    - ""
  quota-join-objective-line: " - <#d4d9d8>%resource% : <#ffeea2>%progress% / %target%"
  quota-rush-planned-announcement:
    - " "
    - "<#fdba5e><b>⚡ Rush prévu à %time% (Durée: %duration% minutes)!"
    - " "
    - "<#ffeea2>/rush join<#d4d9d8> pour vous inscrire !"
  quota-milestone-reached:
    - ""
    - "<#fdba5e><b>¤ Quotas - %rank%"
    - ""
    - <#d4d9d8>%resource% : <#ffeea2>%progress% / %target% <#d4d9d8>(<#91f251>+%elo% ELO<#d4d9d8>)"
  quota-milestone-progress:
    - ""
    - "<#fdba5e><b>¤ Quotas - %rank%"
    - ""
    - <#d4d9d8>%resource% : <#ffeea2>%progress% / %target% <#d4d9d8>(%milestone%%)"

  # Rush info
  rush-info-no-active:
    - " "
    - "<#fdba5e><b>⚡ Aucun Rush en cours !"
    - " "
  rush-info-header:
    - " "
    - "<#fdba5e><b>⚡ Rush en cours !"
    - " "
  rush-info-resource: "<#d4d9d8>Ressource : <#fdba5e>%resource%</#fdba5e>"
  rush-info-duration: "<#d4d9d8>Durée : <#fdba5e>%duration% minutes</#fdba5e>"
  rush-info-status: "<#d4d9d8>Statut : <#fdba5e>%status%</#fdba5e>"
  rush-info-registered-count: "<#d4d9d8>Nombre d'inscrits : <#fdba5e>%count%</#fdba5e>"
  rush-info-scores-header: "<#d4d9d8>Scores des inscrits :</#d4d9d8>"
  rush-info-score-line: "<#d4d9d8> <#fdba5e> %player% : <#fdba5e>%score% pts</#fdba5e>"

