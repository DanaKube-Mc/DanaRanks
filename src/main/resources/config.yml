# Configuration de la base de données
database:
  type: SQLITE # SQLITE ou MYSQL
  mysql:
    host: localhost
    port: 3306
    database: danaranks
    username: root
    password: ""
    prefix: "danaranks_"
    pool:
      maximum-pool-size: 10
      max-lifetime: 1800000

# Intégration LuckPerms
luckperms:
  # Nom de la piste (track) de promotion configurée dans LuckPerms
  track-name: "danaranks"

# Protection anti-cheat / anti-abus (exclure les transactions entre joueurs de l'économie)
anti-abuse:
  # Exclure les gains/pertes d'argent venant de ces plugins (QuickShop, AxTrade, etc.)
  blocked-plugin-packages:
    - "quickshop"
    - "axtrade"

# Configuration des resets globaux
reset:
  # Heure du reset (de 0 à 23)
  hour: 4
  # Date de référence globale pour le calcul des périodes (Format YYYY-MM-DD)
  # Le reset de chaque niveau sera calculé par rapport à cette date.
  reference-date: "2026-07-03"

# Paramètres généraux des quotas
quotas-settings:
  # Multiplicateur pour atteindre le surplus maximum ELO (ex: 10.0 pour un surplus max à 10x la cible)
  surplus-multiplier: 5.8
  # Liste des pourcentages de progression de quota à annoncer dans le chat
  announce-milestones: [50, 100]
  # Paramètres de croissance par défaut (formule de scaling)
  scaling:
    multiplier-per-rank: 1.22 # +22% de quantité par rang
  # Quota de base pour le Rang 1 (Fer I, Période = 1 jour, pas de pénalité donc fail-penalty = 0)
  base-rank-1:
    # Paramètres ELO globaux et nombre d'objectifs max pour ce rang
    base-elo: 10
    max-surplus-elo: 20
    fail-penalty: 0
    max-objectives: 2

    # Liste de tous les objectifs disponibles pour ce rang
    objectives:
      lumens-gained:
        target: 1000
      job-xp-all:
        target: 500

# Configuration du Rush Quotidien
rush:
  # Heure de la planification journalière (tirage au sort de la ressource et des horaires)
  daily-setup-hour: 8
  
  # Plage horaire dans laquelle le Rush peut démarrer (Heures de 0 à 23)
  start-window:
    min-hour: 12
    max-hour: 22

  # Plage de durée de l'événement (en minutes)
  duration-range:
    min-minutes: 20
    max-minutes: 60

  # Temps de pré-annonce avant le lancement (en minutes)
  pre-announce-minutes: 30

  # URL du webhook Discord pour les annonces de Rush
  discord-webhook-url: ""

  # Liste des ressources éligibles pour le tirage au sort quotidien
  eligible-resources:
    - "lumens-gained"
    - "lumens-spent"
    - "job-xp-all"
    - "tool-xp"
    - "vanilla-xp-gained"
    - "vanilla-xp-spent"

  # Configuration visuelle des Boss Bars (Adventure)
  # Couleurs valides : PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  # Styles valides : PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
  bossbar:
    announce:
      color: "BLUE"
      style: "PROGRESS"
      title: "<blue>[Rush] Début du Rush dans %time% (Ressource: %resource%) - Tapez /rush join !"
    active:
      color: "RED"
      style: "PROGRESS"
      title: "<red>[Rush] Temps restant : %time% - Votre Score : <gold>%score%</gold>"

  # Paramètres ELO par groupe de niveau
  rank-settings:
    fer:
      # Facteur de base ELO pour la redistribution intra-rang (si taille >= 2)
      elo-factor: 50.0
      # Multiplicateurs si évaluation transversale (si taille < 2)
      gain-multiplier: 1.5
      loss-multiplier: 0.5
    bronze:
      elo-factor: 40.0
      gain-multiplier: 1.25
      loss-multiplier: 0.75
    argent:
      elo-factor: 30.0
      gain-multiplier: 1.0
      loss-multiplier: 1.0
    or:
      elo-factor: 20.0
      gain-multiplier: 0.75
      loss-multiplier: 1.25
    platine:
      elo-factor: 15.0
      gain-multiplier: 0.5
      loss-multiplier: 1.5

# Configuration du classement (Leaderboard)
leaderboard:
  # Intervalle de mise à jour automatique en minutes (min 1)
  update-interval: 5

